<!DOCTYPE html>
<html>

<head>

<title>Upload Resume</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Upload Resume</h2>

<form method="POST" enctype="multipart/form-data" class="card p-4">

<input type="file" name="resume" class="form-control mb-3" required>

<input type="text" name="name" placeholder="Name" class="form-control mb-3" required>

<input type="email" name="email" placeholder="Email" class="form-control mb-3" required>

<input type="text" name="branch" placeholder="Branch" class="form-control mb-3" required>

<input type="number" step="0.01" name="cgpa" placeholder="CGPA" class="form-control mb-3" required>

<input type="number" name="projects" placeholder="Projects" class="form-control mb-3" required>

<input type="number" name="internships" placeholder="Internships" class="form-control mb-3" required>

<button class="btn btn-success">Analyze Resume</button>

</form>

</div>

</body>

</html>
